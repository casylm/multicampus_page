<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude 세션 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --radius: 8px; }

    [data-theme="dark"] {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --accent: #58a6ff; --accent-dim: #1f6feb;
      --text: #e6edf3; --muted: #8b949e; --user-bg: #1f3a5c;
      --assistant-bg: #1c2128; --green: #3fb950; --red: #f85149;
      --yellow: #d29922;
    }

    [data-theme="light"] {
      --bg: #f6f8fa; --surface: #ffffff; --surface2: #f0f3f6;
      --border: #d0d7de; --accent: #0969da; --accent-dim: #54aeff;
      --text: #1f2328; --muted: #656d76; --user-bg: #dbeafe;
      --assistant-bg: #f6f8fa; --green: #1a7f37; --red: #cf222e;
      --yellow: #9a6700;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .topbar h1 { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; }
    .topbar span.sub { font-size: 0.8rem; color: var(--muted); }

    .btn-open {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: var(--accent); color: #0d1117;
      border: none; border-radius: var(--radius); font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-open:hover { opacity: 0.85; }

    .theme-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px; font-size: 0.9rem;
      cursor: pointer; color: var(--text);
    }

    /* ── Layout ── */
    .layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px; flex-shrink: 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }

    .search-input {
      width: 100%; padding: 7px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.85rem; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .session-count { font-size: 0.78rem; color: var(--muted); }

    .session-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .session-item {
      padding: 12px 14px; border-radius: var(--radius);
      border: 1px solid transparent; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--surface2); border-color: var(--accent); }

    .si-project {
      font-size: 0.7rem; color: var(--accent); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .si-preview {
      font-size: 0.85rem; color: var(--text); font-weight: 500;
      margin-bottom: 6px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .si-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .si-badge {
      font-size: 0.72rem; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 1px 7px; border-radius: 10px;
    }
    .si-badge.green { color: var(--green); border-color: var(--green); }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Empty State ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: var(--muted); text-align: center; padding: 40px;
    }
    .empty-state .icon { font-size: 3rem; }
    .empty-state h2 { font-size: 1.1rem; color: var(--text); }
    .empty-state p { font-size: 0.875rem; line-height: 1.6; max-width: 360px; }
    .empty-state code {
      background: var(--surface); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; color: var(--accent);
    }

    /* ── Conversation Header ── */
    .conv-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .conv-header h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .conv-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat {
      font-size: 0.78rem; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .stat strong { color: var(--text); }

    /* ── Conversation Body ── */
    .conv-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; }

    .msg-role {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .msg-role .time { font-weight: 400; text-transform: none; letter-spacing: 0; }
    .msg-role.user-role { color: var(--accent); }
    .msg-role.assistant-role { color: var(--green); }

    .msg-bubble {
      padding: 12px 16px; border-radius: var(--radius);
      border: 1px solid var(--border); font-size: 0.9rem; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-bubble.user { background: var(--user-bg); border-color: var(--accent-dim); }
    .msg-bubble.assistant { background: var(--assistant-bg); }

    /* Tool use block */
    .tool-block {
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; font-size: 0.82rem;
    }
    .tool-header {
      padding: 6px 12px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      user-select: none;
    }
    .tool-name { font-weight: 600; color: var(--yellow); }
    .tool-toggle { margin-left: auto; color: var(--muted); font-size: 0.75rem; }
    .tool-body {
      padding: 10px 12px; background: var(--bg);
      font-family: "SF Mono", "Consolas", monospace;
      white-space: pre-wrap; word-break: break-all;
      color: var(--muted); max-height: 200px; overflow-y: auto;
    }
    .tool-body.hidden { display: none; }

    /* Thinking block */
    .thinking-block {
      padding: 8px 12px; background: var(--surface2);
      border-left: 3px solid var(--border);
      font-size: 0.8rem; color: var(--muted); font-style: italic;
      border-radius: 0 var(--radius) var(--radius) 0; cursor: pointer;
    }
    .thinking-content { margin-top: 6px; white-space: pre-wrap; }
    .thinking-content.hidden { display: none; }

    /* Token usage */
    .msg-usage {
      font-size: 0.72rem; color: var(--muted);
      display: flex; gap: 10px; padding-top: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Loading */
    .loading {
      text-align: center; padding: 40px; color: var(--muted); font-size: 0.875rem;
    }

    @media (max-width: 700px) {
      .sidebar { width: 100%; }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <h1>Claude 세션 대시보드</h1>
    <span class="sub" id="fileCount"></span>
    <label class="btn-open" title="JSONL 파일 또는 폴더 선택">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1.75 1A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25v-8.5A1.75 1.75 0 0014.25 3H7.5a.25.25 0 01-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75z"/>
      </svg>
      폴더 / 파일 열기
      <input type="file" id="fileInput" accept=".jsonl" multiple style="display:none" />
    </label>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <input class="search-input" id="searchInput" placeholder="세션 검색..." />
        <span class="session-count" id="sessionCount">파일을 열어주세요</span>
      </div>
      <div class="session-list" id="sessionList">
      </div>
    </div>

    <!-- Main -->
    <div class="main" id="main">
      <div class="empty-state">
        <div class="icon">💬</div>
        <h2>Claude 세션을 불러오세요</h2>
        <p>
          <strong>폴더 / 파일 열기</strong>를 클릭하고<br>
          <code>~/.claude/projects/</code> 폴더 또는<br>
          개별 <code>.jsonl</code> 파일을 선택하세요.
        </p>
      </div>
    </div>

  </div>

  <script>
    // ── State ──
    let sessions = [];     // { id, project, preview, timestamp, msgCount, inputTokens, outputTokens, messages }
    let filtered = [];
    let activeIdx = null;

    // ── File Input ──
    const fileInput = document.getElementById('fileInput');
    fileInput.setAttribute('webkitdirectory', '');
    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files).filter(f => f.name.endsWith('.jsonl'));
      if (!files.length) return alert('.jsonl 파일이 없습니다.');
      await loadFiles(files);
      fileInput.value = '';
    });

    async function loadFiles(files) {
      document.getElementById('main').innerHTML = '<div class="loading">파일 읽는 중...</div>';
      sessions = [];

      for (const file of files) {
        try {
          const text = await readFile(file);
          const messages = parseJSONL(text);
          if (!messages.length) continue;

          const info = extractSessionInfo(messages, file);
          if (info) sessions.push(info);
        } catch(e) { console.warn('파일 오류:', file.name, e); }
      }

      // sort by timestamp desc
      sessions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      filtered = [...sessions];

      document.getElementById('fileCount').textContent = `${files.length}개 파일`;
      renderList();
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <div class="icon">👈</div>
          <h2>${sessions.length}개 세션 로드됨</h2>
          <p>왼쪽 목록에서 세션을 클릭해 대화를 확인하세요.</p>
        </div>`;
    }

    function readFile(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsText(file, 'utf-8');
      });
    }

    function parseJSONL(text) {
      return text.split('\n')
        .filter(l => l.trim())
        .map(l => { try { return JSON.parse(l); } catch { return null; } })
        .filter(Boolean);
    }

    function extractSessionInfo(messages, file) {
      const userMsgs    = messages.filter(m => m.type === 'user');
      const assistantMs = messages.filter(m => m.type === 'assistant');
      if (!userMsgs.length) return null;

      const first = userMsgs[0];
      const preview = getTextFromContent(first.message?.content) || '(내용 없음)';

      // project from cwd or file path
      const cwd = first.cwd || '';
      const project = cwd ? cwd.split(/[/\\]/).pop() : (file.webkitRelativePath?.split('/')[0] || file.name);

      let inputTokens = 0, outputTokens = 0;
      assistantMs.forEach(m => {
        const u = m.message?.usage;
        if (u) { inputTokens += u.input_tokens || 0; outputTokens += u.output_tokens || 0; }
      });

      return {
        id: first.sessionId || file.name,
        project,
        preview: preview.slice(0, 120),
        timestamp: first.timestamp || '',
        msgCount: userMsgs.length + assistantMs.length,
        userCount: userMsgs.length,
        inputTokens,
        outputTokens,
        messages,
      };
    }

    function getTextFromContent(content) {
      if (!content) return '';
      if (typeof content === 'string') return content.trim();
      if (Array.isArray(content)) {
        const t = content.find(b => b.type === 'text');
        return t?.text?.trim() || '';
      }
      return '';
    }

    // ── Render List ──
    function renderList() {
      const list = document.getElementById('sessionList');
      const count = document.getElementById('sessionCount');
      count.textContent = `${filtered.length}개 세션`;
      list.innerHTML = '';

      filtered.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'session-item' + (activeIdx === i ? ' active' : '');
        el.innerHTML = `
          <div class="si-project">${escHtml(s.project)}</div>
          <div class="si-preview">${escHtml(s.preview)}</div>
          <div class="si-meta">
            <span class="si-badge">${formatDate(s.timestamp)}</span>
            <span class="si-badge">💬 ${s.userCount}턴</span>
            <span class="si-badge green">↑${fmt(s.inputTokens)} ↓${fmt(s.outputTokens)}</span>
          </div>`;
        el.addEventListener('click', () => openSession(i));
        list.appendChild(el);
      });
    }

    // ── Open Session ──
    function openSession(idx) {
      activeIdx = idx;
      renderList();

      const s = filtered[idx];
      const main = document.getElementById('main');

      const convMsgs = s.messages.filter(m => m.type === 'user' || m.type === 'assistant');

      main.innerHTML = `
        <div class="conv-header">
          <h2>${escHtml(s.preview.slice(0, 80))}${s.preview.length > 80 ? '…' : ''}</h2>
          <div class="conv-stats">
            <span class="stat">📁 <strong>${escHtml(s.project)}</strong></span>
            <span class="stat">📅 <strong>${formatDateFull(s.timestamp)}</strong></span>
            <span class="stat">💬 <strong>${s.userCount}턴</strong></span>
            <span class="stat">🔢 입력 <strong>${fmt(s.inputTokens)}</strong> / 출력 <strong>${fmt(s.outputTokens)}</strong> 토큰</span>
          </div>
        </div>
        <div class="conv-body" id="convBody"></div>`;

      const body = document.getElementById('convBody');

      convMsgs.forEach(m => {
        if (m.type === 'user') renderUserMsg(body, m);
        else if (m.type === 'assistant') renderAssistantMsg(body, m);
      });
    }

    function renderUserMsg(container, m) {
      const content = m.message?.content;
      // Skip tool result-only messages (intermediate)
      if (Array.isArray(content) && content.every(b => b.type === 'tool_result')) return;

      const div = document.createElement('div');
      div.className = 'msg';

      let html = `<div class="msg-role user-role">👤 사용자 <span class="time">${formatTime(m.timestamp)}</span></div>`;

      if (typeof content === 'string') {
        html += `<div class="msg-bubble user">${escHtml(content)}</div>`;
      } else if (Array.isArray(content)) {
        content.forEach(b => {
          if (b.type === 'text') {
            html += `<div class="msg-bubble user">${escHtml(b.text)}</div>`;
          }
        });
      }

      div.innerHTML = html;
      container.appendChild(div);
    }

    function renderAssistantMsg(container, m) {
      const content = m.message?.content;
      if (!content || !Array.isArray(content)) return;

      // Skip if no visible content
      const hasVisible = content.some(b => b.type === 'text' || b.type === 'tool_use');
      if (!hasVisible) return;

      const div = document.createElement('div');
      div.className = 'msg';

      const usage = m.message?.usage;
      const usageHtml = usage
        ? `<div class="msg-usage"><span>↑ ${fmt(usage.input_tokens || 0)} 입력</span><span>↓ ${fmt(usage.output_tokens || 0)} 출력</span></div>`
        : '';

      let html = `<div class="msg-role assistant-role">🤖 Claude <span class="time">${formatTime(m.timestamp)}</span></div>`;

      // Thinking blocks
      const thinkingBlocks = content.filter(b => b.type === 'thinking' && b.thinking);
      if (thinkingBlocks.length) {
        const id = 'th_' + Math.random().toString(36).slice(2);
        html += `<div class="thinking-block" onclick="toggleEl('${id}')">💭 추론 과정 (클릭해서 펼치기)<div class="thinking-content hidden" id="${id}">${escHtml(thinkingBlocks.map(b=>b.thinking).join('\n\n'))}</div></div>`;
      }

      // Text blocks
      const textBlocks = content.filter(b => b.type === 'text');
      textBlocks.forEach(b => {
        html += `<div class="msg-bubble assistant">${escHtml(b.text)}</div>`;
      });

      // Tool use blocks
      const toolBlocks = content.filter(b => b.type === 'tool_use');
      toolBlocks.forEach(b => {
        const id = 'tool_' + Math.random().toString(36).slice(2);
        const input = JSON.stringify(b.input, null, 2);
        html += `
          <div class="tool-block">
            <div class="tool-header" onclick="toggleEl('${id}')">
              <span>🔧</span>
              <span class="tool-name">${escHtml(b.name)}</span>
              <span class="tool-toggle" id="${id}_arrow">▼ 펼치기</span>
            </div>
            <div class="tool-body hidden" id="${id}">${escHtml(input)}</div>
          </div>`;
      });

      html += usageHtml;
      div.innerHTML = html;
      container.appendChild(div);
    }

    // ── Toggle helper ──
    window.toggleEl = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const hidden = el.classList.toggle('hidden');
      const arrow = document.getElementById(id + '_arrow');
      if (arrow) arrow.textContent = hidden ? '▼ 펼치기' : '▲ 접기';
    };

    // ── Search ──
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      filtered = q
        ? sessions.filter(s => s.preview.toLowerCase().includes(q) || s.project.toLowerCase().includes(q))
        : [...sessions];
      activeIdx = null;
      renderList();
    });

    // ── Theme ──
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    const savedTheme = localStorage.getItem('claude-dash-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    themeBtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    themeBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('claude-dash-theme', next);
    });

    // ── Helpers ──
    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmt(n) {
      if (!n) return '0';
      if (n >= 1000) return (n/1000).toFixed(1) + 'k';
      return String(n);
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatDateFull(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  </script>
</body>
</html>
